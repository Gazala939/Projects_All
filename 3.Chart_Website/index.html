<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat Website</title>
  <style>
    .chat-container {
  width: 360px; 
  background: #fff;
  border-radius: 15px; 
  overflow: hidden;
  box-shadow: 0 5px 15px rgba(0,0,0,0.2);
  margin: 50px auto;
  font-family: 'Segoe UI', sans-serif;
}

.header { 
  background: #075E54; 
  color: #fff; 
  padding: 18px; 
  text-align: center; 
  font-size: 20px; 
  font-weight: bold;
}

.chat-box { 
  height: 480px; 
  overflow-y: auto;
  padding: 15px; 
  background: #E5DDD5;
}

.user { 
  background: #DCF8C6; 
  padding: 10px; 
  margin: 8px 0; 
  border-radius: 10px; 
  width: fit-content; 
  max-width: 80%;
  margin-left: auto;
}

.bot { 
  background: #fff; 
  padding: 10px; 
  margin: 8px 0; 
  border-radius: 10px; 
  width: fit-content; 
  max-width: 80%;
}

.input-area { 
  display: flex; 
  border-top: 1px solid #ccc;

}

input { 
  flex: 1; 
  padding: 15px; 
  border: none; 
  outline: none; 
  font-size: 16px; 
  
}

button { 
  background: #25D366; 
  color: #fff; 
  border: none;
  padding: 15px 25px; 
  cursor: pointer;
  font-weight: bold;
  
}

button:hover { 
  background: #128C7E; 
}
  </style>
</head>
<body>
  <div class="chat-container">
    <div class="header">💬 Chat Website</div>
    <div id="chatBox" class="chat-box">
      <div class="bot">Hello! 👋 Welcome to the chat.</div>
    </div>
    <div class="input-area">
      <input type="text" id="message" placeholder="Type your message...">
      <button onclick="sendMessage()">Send</button>
    </div>
  </div>

  <script>
    function sendMessage(){
        let input = document.getElementById("message");
        let chatBox = document.getElementById("chatBox");
        let text = input.value.trim();
        if(text === "") return;

  // User message
       let userMsg = document.createElement("div");
       userMsg.className = "user";
       userMsg.innerText = "You said: " + text;
       chatBox.appendChild(userMsg);
       input.value = "";
       chatBox.scrollTop = chatBox.scrollHeight;

  // Bot reply after 700ms
  // Bot reply after 700ms
setTimeout(() => {

    let botMsg = document.createElement("div");
    botMsg.className = "bot";

    let message = text.toLowerCase().trim();

    if(message === "hi" || message === "hello"){
        botMsg.innerText = "Bot: Hi 👋";
    }
    else if(message === "how are you" || message === "how are u"){
        botMsg.innerText = "Bot: I am fine, thanks! 😊\nHow are you?";
    }
    else if(message === "i am fine" || message === "i'm fine"){
        botMsg.innerText = "Bot: That's great to hear! 😄";
    }
    else if(message === "what is your name"){
        botMsg.innerText = "Bot: My name is ChatWave Bot.";
    }
    else if(message === "bye"){
        botMsg.innerText = "Bot: Goodbye! Have a nice day 👋";
    }
    else if(message === "thank you"){
        botMsg.innerText = "Bot: You're welcome 😊";
    }
    else{
        botMsg.innerText = "Bot: Sorry, I didn't understand that.";
    }

    chatBox.appendChild(botMsg);
    chatBox.scrollTop = chatBox.scrollHeight;

}, 700);
}

// Send message on Enter key
document.getElementById("message").addEventListener("keypress", function(e){
  if(e.key === "Enter") sendMessage();
});
  </script>
</body>
</html>
